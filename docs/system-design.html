<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TurboMQ — System Design</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
<style>
:root {
  --bg-base:       #0a0e1a;
  --bg-card:       #111827;
  --bg-code:       #1a1f35;
  --accent-cyan:   #00d4ff;
  --accent-green:  #00ff88;
  --accent-orange: #ff6b35;
  --accent-purple: #a855f7;
  --text-primary:  #f0f4ff;
  --text-secondary:#8892b0;
  --text-muted:    #4a5568;
  --border:        rgba(0,212,255,0.12);
  --font-body:     'Inter', system-ui, sans-serif;
  --font-mono:     'JetBrains Mono', monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  background: var(--bg-base);
  color: var(--text-primary);
  font-family: var(--font-body);
  font-size: 15px;
  line-height: 1.7;
  -webkit-font-smoothing: antialiased;
}

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg-base); }
::-webkit-scrollbar-thumb { background: #2a3050; border-radius: 3px; }

/* --- NAV BAR --- */
.nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px; height: 52px;
  background: rgba(10,14,26,0.92);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
}
.nav::after {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent-cyan), transparent);
  opacity: 0.4;
}
.nav-left { display: flex; align-items: center; gap: 12px; }
.nav-logo {
  width: 28px; height: 28px; border-radius: 7px;
  background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; box-shadow: 0 0 16px rgba(0,212,255,0.25);
}
.nav-title {
  font-size: 16px; font-weight: 700;
  background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.nav-sep { color: var(--text-muted); font-weight: 300; }
.nav-subtitle { color: var(--text-secondary); font-size: 13px; font-weight: 500; }
.nav-right { display: flex; gap: 8px; }
.nav-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 14px; border-radius: 6px;
  font-size: 12px; font-weight: 600; cursor: pointer;
  border: 1px solid var(--border); background: transparent;
  color: var(--text-secondary); text-decoration: none;
  transition: all 0.2s;
}
.nav-btn:hover { border-color: var(--accent-cyan); color: var(--accent-cyan); box-shadow: 0 0 16px rgba(0,212,255,0.15); }
.nav-btn-primary { background: var(--accent-cyan); border-color: var(--accent-cyan); color: var(--bg-base); }
.nav-btn-primary:hover { background: #33ddff; }

/* --- SIDEBAR TOC --- */
.layout { display: flex; margin-top: 52px; min-height: calc(100vh - 52px); }
.sidebar {
  position: fixed; top: 52px; left: 0; bottom: 0; width: 280px;
  background: var(--bg-card); border-right: 1px solid var(--border);
  overflow-y: auto; padding: 20px 0;
}
.sidebar-title {
  padding: 0 20px 12px; font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-muted);
}
.toc-list { list-style: none; }
.toc-item a {
  display: block; padding: 6px 20px; font-size: 13px;
  color: var(--text-secondary); text-decoration: none;
  border-left: 2px solid transparent; transition: all 0.15s;
}
.toc-item a:hover { color: var(--accent-cyan); background: rgba(0,212,255,0.04); border-left-color: rgba(0,212,255,0.3); }
.toc-item a.active { color: var(--accent-cyan); border-left-color: var(--accent-cyan); background: rgba(0,212,255,0.06); font-weight: 600; }
.toc-item.depth-3 a { padding-left: 36px; font-size: 12px; }

/* --- CONTENT --- */
.content {
  margin-left: 280px; max-width: 860px; padding: 40px 48px 80px;
}

/* Markdown styles */
.content h1 {
  font-size: 32px; font-weight: 800; margin: 0 0 8px;
  background: linear-gradient(135deg, var(--accent-cyan), var(--accent-green));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.content h2 {
  font-size: 22px; font-weight: 700; color: var(--text-primary);
  margin: 48px 0 16px; padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}
.content h3 { font-size: 17px; font-weight: 600; color: var(--accent-cyan); margin: 32px 0 12px; }
.content h4 { font-size: 14px; font-weight: 600; color: var(--text-secondary); margin: 24px 0 8px; text-transform: uppercase; letter-spacing: 0.5px; }

.content p { margin: 0 0 16px; color: var(--text-secondary); }
.content strong { color: var(--text-primary); font-weight: 600; }
.content em { color: var(--accent-purple); font-style: italic; }

.content ul, .content ol { margin: 0 0 16px; padding-left: 24px; color: var(--text-secondary); }
.content li { margin-bottom: 6px; }
.content li::marker { color: var(--accent-cyan); }

.content a { color: var(--accent-cyan); text-decoration: none; border-bottom: 1px solid rgba(0,212,255,0.3); }
.content a:hover { border-bottom-color: var(--accent-cyan); }

.content blockquote {
  margin: 0 0 16px; padding: 12px 16px;
  border-left: 3px solid var(--accent-purple);
  background: rgba(168,85,247,0.06); border-radius: 0 8px 8px 0;
  color: var(--text-secondary);
}

.content code {
  font-family: var(--font-mono); font-size: 13px;
  background: var(--bg-code); padding: 2px 6px; border-radius: 4px;
  color: var(--accent-green);
}

.content pre {
  margin: 0 0 20px; padding: 16px 20px;
  background: var(--bg-code); border: 1px solid var(--border);
  border-radius: 10px; overflow-x: auto;
}
.content pre code { background: none; padding: 0; color: var(--text-primary); font-size: 13px; line-height: 1.6; }

.content table {
  width: 100%; margin: 0 0 20px; border-collapse: collapse;
  font-size: 13px;
}
.content th {
  text-align: left; padding: 10px 14px;
  background: var(--bg-code); border: 1px solid var(--border);
  color: var(--accent-cyan); font-weight: 600; font-size: 11px;
  text-transform: uppercase; letter-spacing: 0.5px;
}
.content td {
  padding: 10px 14px; border: 1px solid var(--border);
  color: var(--text-secondary);
}
.content tr:hover td { background: rgba(0,212,255,0.03); }

.content hr { border: none; border-top: 1px solid var(--border); margin: 32px 0; }

.content img { max-width: 100%; border-radius: 8px; }

/* Mermaid diagrams */
.mermaid {
  margin: 16px 0 24px; padding: 20px;
  background: var(--bg-code); border: 1px solid var(--border);
  border-radius: 10px; text-align: center;
}
.mermaid svg { max-width: 100%; }

/* --- RESPONSIVE --- */
@media (max-width: 960px) {
  .sidebar { display: none; }
  .content { margin-left: 0; padding: 24px 20px 60px; }
}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-left">
    <div class="nav-logo">📨</div>
    <span class="nav-title">TurboMQ</span>
    <span class="nav-sep">/</span>
    <span class="nav-subtitle">System Design Document</span>
  </div>
  <div class="nav-right">
    <a class="nav-btn" href="index.html">Demo</a>
    <a class="nav-btn nav-btn-primary" href="https://github.com/ndqkhanh/turbo-mq" target="_blank">GitHub</a>
  </div>
</nav>

<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-title">On This Page</div>
    <ul class="toc-list" id="toc"></ul>
  </aside>
  <main class="content" id="content"></main>
</div>

<script>
mermaid.initialize({
  startOnLoad: false,
  theme: 'dark',
  themeVariables: {
    darkMode: true,
    background: '#1a1f35',
    primaryColor: '#0d3b66',
    primaryTextColor: '#f0f4ff',
    primaryBorderColor: '#00d4ff',
    lineColor: '#4a5568',
    secondaryColor: '#1a1f35',
    tertiaryColor: '#111827',
    fontFamily: 'Inter, sans-serif',
    fontSize: '13px'
  }
});

const renderer = new marked.Renderer();

// Custom heading renderer for IDs
renderer.heading = function(text, level) {
  // marked v14+ passes object; older passes string
  const raw = typeof text === 'object' ? text.text : text;
  const depth = typeof text === 'object' ? text.depth : level;
  const slug = raw.toLowerCase().replace(/<[^>]*>/g, '').replace(/[^\w]+/g, '-').replace(/^-|-$/g, '');
  return `<h${depth} id="${slug}">${raw}</h${depth}>`;
};

marked.setOptions({ renderer, gfm: true, breaks: false });

async function loadMarkdown() {
  try {
    const resp = await fetch('system-design.md');
    if (!resp.ok) throw new Error('Failed to load');
    let md = await resp.text();

    // Extract mermaid blocks before marked processes them
    const mermaidBlocks = [];
    md = md.replace(/```mermaid\n([\s\S]*?)```/g, (_, code) => {
      const id = `mermaid-${mermaidBlocks.length}`;
      mermaidBlocks.push({ id, code: code.trim() });
      return `<div class="mermaid" id="${id}"></div>`;
    });

    const html = marked.parse(md);
    document.getElementById('content').innerHTML = html;

    // Render mermaid diagrams
    for (const block of mermaidBlocks) {
      try {
        const { svg } = await mermaid.render(block.id + '-svg', block.code);
        const el = document.getElementById(block.id);
        if (el) el.innerHTML = svg;
      } catch (e) {
        const el = document.getElementById(block.id);
        if (el) el.innerHTML = `<pre style="color:var(--accent-orange);font-size:12px;">Diagram render error: ${e.message}</pre>`;
      }
    }

    buildTOC();
    setupScrollSpy();
  } catch (e) {
    document.getElementById('content').innerHTML =
      `<h1>Error</h1><p>Could not load system-design.md: ${e.message}</p>`;
  }
}

function buildTOC() {
  const headings = document.querySelectorAll('.content h2, .content h3');
  const toc = document.getElementById('toc');
  toc.innerHTML = '';
  headings.forEach(h => {
    const li = document.createElement('li');
    li.className = 'toc-item' + (h.tagName === 'H3' ? ' depth-3' : '');
    const a = document.createElement('a');
    a.href = '#' + h.id;
    a.textContent = h.textContent;
    a.dataset.target = h.id;
    li.appendChild(a);
    toc.appendChild(li);
  });
}

function setupScrollSpy() {
  const links = document.querySelectorAll('.toc-item a');
  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        links.forEach(l => l.classList.remove('active'));
        const active = document.querySelector(`.toc-item a[data-target="${entry.target.id}"]`);
        if (active) active.classList.add('active');
      }
    });
  }, { rootMargin: '-60px 0px -70% 0px' });

  document.querySelectorAll('.content h2, .content h3').forEach(h => observer.observe(h));
}

loadMarkdown();
</script>
</body>
</html>
